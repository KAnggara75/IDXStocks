name: CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  changes:
    runs-on: ubuntu-24.04
    outputs:
      src: ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: dorny/paths-filter@v4.0.1
        id: filter
        with:
          filters: |
            src:
              - '**.go'
              - 'go.mod'
              - 'go.sum'
              - 'Dockerfile'
              - 'migrations/**'
              - '.github/workflows/pipeline.yaml'

  unit_test:
    name: Unit Tests & Coverage
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: "1.26.2"
          cache: true

      - name: Run Tests
        run: |
          go test -v -coverprofile=coverage.out ./...
          COVERAGE=$(go tool cover -func=coverage.out | grep total: | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: $COVERAGE%"
          # Enforce 75% coverage
          awk -v cov="$COVERAGE" 'BEGIN { if (cov < 75) { print "Coverage too low: " cov " < 75"; exit 1 } }'

  security_scan:
    name: Go Security Scan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: "1.26.2"
          cache: true

      - name: Install tools
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          go install honnef.co/go/tools/cmd/staticcheck@latest
          go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run govulncheck
        run: govulncheck ./...

      - name: Run staticcheck
        run: staticcheck ./...

      - name: Run gosec
        run: gosec ./...

  docker_build_push:
    name: Build and Push Docker Image
    needs: [security_scan, unit_test, changes]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.src == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: KAnggara/DevOps/dockerbuild@v0.1.7
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
